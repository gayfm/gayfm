<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedir Música | Gay FM Brasil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000000; color: white; }
        
        .rainbow-text {
            background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #00bfff, #0000ff, #8b00ff);
            background-size: 300% auto;
            animation: rainbowMove 6s linear infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        @keyframes rainbowMove { 0% { background-position: 0% center; } 100% { background-position: 300% center; } }

        input, textarea {
            background-color: #0a0a0a !important;
            border: 1px solid #333 !important;
            color: white !important;
        }

        input:focus, textarea:focus {
            border-color: #ff0000 !important;
            outline: none;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.2);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-md bg-[#0a0a0a] p-8 rounded-3xl shadow-2xl border border-gray-900">
        <div class="text-center mb-8">
            <h1 class="text-4xl rainbow-text italic mb-2">FAÇA SEU PEDIDO</h1>
            <p class="text-gray-500 text-sm">Queremos ouvir o seu gosto musical!</p>
        </div>

        <form action="https://formspree.io/f/gayfmbr@gmail.com" method="POST" class="space-y-5">
            
            <div>
                <label class="block text-xs uppercase tracking-widest text-gray-400 font-bold mb-2">Seu Nome</label>
                <input type="text" name="nome" placeholder="Como quer ser chamado?" required 
                    class="w-full px-4 py-3 rounded-xl transition-all">
            </div>

            <div>
                <label class="block text-xs uppercase tracking-widest text-gray-400 font-bold mb-2">Seu E-mail</label>
                <input type="email" name="email" placeholder="Para a gente te avisar" required 
                    class="w-full px-4 py-3 rounded-xl transition-all">
            </div>

            <div>
                <label class="block text-xs uppercase tracking-widest text-gray-400 font-bold mb-2">Música e Artista</label>
                <textarea name="pedido" rows="3" placeholder="Ex: Pabllo Vittar - Alibi" required 
                    class="w-full px-4 py-3 rounded-xl transition-all"></textarea>
            </div>

            <input type="hidden" name="_subject" value="Novo Pedido de Música: Gay FM Brasil">

            <button type="submit" 
                class="w-full py-4 rounded-xl bg-white text-black font-black uppercase tracking-tighter hover:scale-105 transition-transform shadow-lg">
                Enviar para o DJ 🚀
            </button>
        </form>

        <footer class="mt-8 text-center">
            <p class="text-[10px] text-gray-600 uppercase tracking-widest">
                Gay FM Brasil &bull; Ao vivo 2026
            </p>
        </footer>
    </div>

</body>
</html>
