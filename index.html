<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gay FM Brasil | A sua rádio </title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Fundo do site em Preto */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            background: #000000; 
            /* REMOVI o overflow: hidden para permitir que a página role se necessário */
        }
        
        /* Área das páginas (Home, Comunidade) */
        #conteudo-principal {
            width: 100%;
            /* Ajustei a altura para ocupar a tela toda, o player fica por cima fixo */
            height: 100vh; 
            border: none;
            background: #000000;
            display: block;
        }

        /* Barra do Player no Rodapé */
        #barra-player {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 110px; 
            background: rgba(10, 10, 10, 0.95); /* Leve transparência para estilo */
            border-top: 1px solid #222;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.8);
            backdrop-filter: blur(10px); /* Efeito de vidro jateado */
        }

        .rainbow-text {
            background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        /* Melhoria no Player para Dark Mode */
        audio {
            width: 280px; 
            height: 40px;
            filter: invert(1) hue-rotate(180deg) brightness(1.2);
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <iframe src="home.html" name="janela_site" id="conteudo-principal" allow="autoplay"></iframe>

    <div id="barra-player">
        <div class="max-w-4xl w-full px-6 flex flex-col md:flex-row items-center justify-between gap-2">
            
            <div class="flex items-center">
                <span class="animate-pulse mr-2 text-red-500">●</span>
                <p class="text-sm md:text-base rainbow-text uppercase tracking-tighter">
                    Ao Vivo: Gay FM Brasil
                </p>
            </div>

            <audio id="radioPlayer" controls>
                <source src="https://gayfmbr.mooo.com/radio/8000/radio.mp3" type="audio/mpeg">
                <source src="https://gayfmbr.mooo.com/listen/gay_fm_br/radio.mp3" type="audio/mpeg">
                Seu navegador não suporta áudio.
            </audio>

        </div>
    </div>

</body>
</html>
