<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gay FM Brasil | Player Fixo</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Fundo do site em Preto */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            overflow: hidden; 
            background: #000000; 
        }
        
        /* Área das páginas (Home, Comunidade) */
        #conteudo-principal {
            width: 100%;
            height: calc(100% - 110px); 
            border: none;
            background: #000000; /* Garante que o fundo atrás do iframe seja preto */
        }

        /* Barra do Player no Rodapé em Preto */
        #barra-player {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 110px; 
            background: #0a0a0a; /* Um preto levemente mais suave para dar profundidade */
            border-top: 1px solid #222; /* Borda sutil para separar do conteúdo */
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.5);
        }

        .rainbow-text {
            background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            filter: drop-shadow(0px 0px 2px rgba(255,255,255,0.1)); /* Leve brilho para destacar no preto */
        }

        /* Customização visual do player de áudio para combinar com o tema dark */
        audio {
            width: 280px; 
            height: 45px;
            filter: invert(1) hue-rotate(180deg) brightness(1.5); /* Inverte as cores do player padrão para ficar claro no fundo escuro */
        }
    </style>
</head>
<body>

    <iframe src="home.html" name="janela_site" id="conteudo-principal"></iframe>

    <div id="barra-player">
        <div class="max-w-4xl w-full px-6 flex flex-col md:flex-row items-center justify-between gap-2">
            
            <div class="flex items-center">
                <span class="animate-pulse mr-2 text-red-500">●</span>
                <p class="text-sm md:text-base rainbow-text uppercase tracking-tighter">
                    Ao Vivo: Gay FM Brasil
                </p>
            </div>

            <audio id="radioPlayer" controls>
                <source src="https://gayfmbr.mooo.com/radio/8000/radio.mp3" type="audio/mpeg">
                <source src="https://gayfmbr.mooo.com/listen/gay_fm_br/radio.mp3" type="audio/mpeg">
                Seu navegador não suporta áudio.
            </audio>

        </div>
    </div>

</body>
</html>
