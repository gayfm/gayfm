<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAY FM BRASIL | A sua rádio 24h</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Fundo do site em Preto */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            background: #000000; 
            overflow: hidden; /* Mantém o player fixo e o iframe rola internamente */
        }
        
        /* Área do Iframe */
        #conteudo-principal {
            width: 100%;
            height: calc(100vh - 90px); /* Ajustado para dar espaço exato ao player */
            border: none;
            background: #000000;
            display: block;
        }

        /* Barra do Player no Rodapé */
        #barra-player {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 90px; 
            background: rgba(5, 5, 5, 0.98);
            border-top: 2px solid transparent;
            /* Borda superior com gradiente arco-íris */
            border-image: linear-gradient(90deg, #E40303, #FF8C00, #FFED00, #008026, #24408E, #732982) 1;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            box-shadow: 0 -15px 35px rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
        }

        .rainbow-text {
            background: linear-gradient(90deg, #E40303, #FF8C00, #FFED00, #008026, #24408E, #732982);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            letter-spacing: -0.05em;
        }

        /* Player Estilizado para Dark Mode */
        audio {
            width: 300px; 
            height: 35px;
            filter: invert(100%) hue-rotate(180deg) brightness(1.5) contrast(90%);
            opacity: 0.85;
        }

        /* Animação do ponto de "Ao Vivo" */
        .live-dot {
            width: 8px;
            height: 8px;
            background-color: #ff0000;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px #ff0000;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.7; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.7; }
        }
    </style>
</head>
<body>

    <iframe src="home.html" name="janela_site" id="conteudo-principal" allow="autoplay"></iframe>

    <div id="barra-player">
        <div class="max-w-5xl w-full px-6 flex flex-col md:flex-row items-center justify-between gap-4">
            
            <div class="flex items-center">
                <span class="live-dot"></span>
                <p class="text-sm md:text-lg rainbow-text uppercase italic font-black">
                    AO VIVO: GAY FM BRASIL
                </p>
            </div>

            <audio id="radioPlayer" controls autoplay>
                <source src="https://gayfmbr.mooo.com/listen/gay_fm_br/radio.mp3" type="audio/mpeg">
                <source src="https://gayfmbr.mooo.com/radio/8000/radio.mp3" type="audio/mpeg">
                Seu navegador não suporta áudio.
            </audio>

            <div class="hidden md:block">
                <p class="text-[10px] text-zinc-500 font-bold tracking-widest">WWW.GAYFM.COM.BR</p>
            </div>

        </div>
    </div>

</body>
</html>
