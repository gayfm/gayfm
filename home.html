<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Início | Gay FM Brasil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

<style>
    /* FUNDO PRETO */
    body { font-family: 'Inter', sans-serif; background-color: #000000; color: white; }
    
    /* TEXTO ARCO-ÍRIS (TÍTULOS) */
    .rainbow-text {
        background: linear-gradient(
            90deg,
            #ff0000,
            #ff7f00,
            #ffff00,
            #00ff00,
            #00bfff,
            #0000ff,
            #8b00ff
        );
        background-size: 300% auto;
        animation: rainbowMove 6s linear infinite;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-weight: 900;
    }

    @keyframes rainbowMove {
        0% { background-position: 0% center; }
        100% { background-position: 300% center; }
    }

    /* TEXTO DA BARRA (DIREITA → ESQUERDA) */
    .rainbow-flow {
        background: linear-gradient(
            270deg,
            #ff0000,
            #ff7f00,
            #ffff00,
            #00ff00,
            #00bfff,
            #0000ff,
            #8b00ff
        );
        background-size: 300% auto;
        animation: rainbowFlow 5s linear infinite;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-weight: bold;
    }

    @keyframes rainbowFlow {
        0% { background-position: 300% center; }
        100% { background-position: 0% center; }
    }

    /* ESTILO DOS CARDS ESCUROS */
    .dark-card {
        background-color: #0a0a0a;
        border: 1px solid #222;
        transition: all 0.3s ease;
    }
    .dark-card:hover {
        border-color: #444;
        transform: scale(1.05);
        box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    }
</style>

</head>
<body class="text-white">

<div class="max-w-4xl mx-auto px-6 py-10 text-center">

    <h1 class="text-6xl rainbow-text italic tracking-tighter mb-2">GAY FM BRASIL</h1>
    <p class="text-gray-400 font-medium">A rádio vibrante da comunidade LGBTQIA+</p>

    <div class="mt-12 text-center">
        <h2 class="text-2xl mb-4 rainbow-text italic">Sobre a Gay FM Brasil</h2>
        <p class="text-gray-400 max-w-2xl mx-auto leading-relaxed">
